<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Juegito</title>
    <style>
      .pacman {
        width: 50px;
        height: 50px;
        position: relative;
        top: 0;
        left: 0;
      }

      .derecha{
        transform: rotate(0deg);
      }

      .izquierda{
        transform: scaleX(-1);
      }

      .abajo{
        transform: rotate(90deg);
      }

      .arriba{
        transform: rotate(270deg);
      }

      .midiv {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 98vh;
      }

      .tablero {
        width: 500px;
        height: 500px;
        background-color: black;
        position: absolute;
      }
    </style>
  </head>
  <body>
    <div class="midiv">
      <div class="tablero" id="tablero">
        <img src="pacmangif.gif" alt="" id="pacman" class="pacman">
      </div>
    </div>

    <script>
      const pacman = document.querySelector("#pacman");
      let posX = 0;
      let posY = 0;
      document.addEventListener("keydown", movimiento);
      function movimiento() {
        if (event.key === "ArrowRight") {
          posX = posX + 5;
          pacman.style.left = posX + "px";
          pacman.classList.add("derecha")
          pacman.classList.remove("izquierda")
          pacman.classList.remove("abajo")
          pacman.classList.remove("arriba")
          if (posX > 450) {
            posX = 0;
            pacman.style.left = posX + "px";
          }
        } else if (event.key === "ArrowLeft") {
          posX = posX - 5;
          pacman.style.left = posX + "px";
          pacman.classList.add("izquierda")
          pacman.classList.remove("derecha")
          pacman.classList.remove("abajo")
          pacman.classList.remove("arriba")
          if (posX < 0) {
            posX = 450;
            pacman.style.left = posX + "px";
          }
        } else if (event.key === "ArrowDown") {
          posY = posY + 5;
          pacman.style.top = posY + "px";
          pacman.classList.add("abajo")
          pacman.classList.remove("izquierda")
          pacman.classList.remove("derecha")
          pacman.classList.remove("arriba")
          if (posY > 450) {
            posY = 0;
            pacman.style.top = posY + "px";
          }
        }
        if (event.key === "ArrowUp") {
          posY = posY - 5;
          pacman.style.top = posY + "px";
          pacman.classList.add("arriba")
          pacman.classList.remove("izquierda")
          pacman.classList.remove("abajo")
          pacman.classList.remove("derecha")
          if (posY < 0) {
            posY = 450;
            pacman.style.top = posY + "px";
          }
        }
        console.log(pacman.style.left+" left")
        console.log(pacman.style.top+" top")
      }
    </script>
  </body>
</html>
